<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="警示店拜訪">
<meta name="theme-color" content="#003595">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>警示店拜訪追蹤</title>
<style>
  :root{
    --alcon:#003595;
    --alcon-lt:#0057B8;
    --ink:#1C2530;
    --sub:#5A6675;
    --line:#D9DFE7;
    --bg:#FFFFFF;
    --panel:#F5F7FA;
    --alert:#B3261E;
    --ok:#1B7A3D;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--ink);font-size:16px;line-height:1.5;
    padding-bottom:80px;
  }
  header{
    background:var(--alcon);color:#fff;padding:20px 16px 16px;
  }
  header h1{font-size:20px;font-weight:600;letter-spacing:1px;}
  header p{font-size:13px;opacity:.85;margin-top:4px;}
  .wrap{padding:16px;max-width:640px;margin:0 auto;}

  .toolbar{display:flex;gap:8px;margin-bottom:16px;}
  .btn{
    border:1px solid var(--alcon);background:#fff;color:var(--alcon);
    font-size:14px;font-weight:600;padding:10px 14px;cursor:pointer;
    font-family:inherit;
  }
  .btn.primary{background:var(--alcon);color:#fff;}
  .btn:active{opacity:.75;}
  .btn.small{padding:6px 10px;font-size:13px;}
  .btn.danger{border-color:var(--alert);color:var(--alert);}

  .store{
    border:1px solid var(--line);margin-bottom:14px;background:#fff;
  }
  .store-head{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px;cursor:pointer;
  }
  .store-head .name{font-size:17px;font-weight:600;}
  .tag{
    font-size:12px;font-weight:600;padding:3px 8px;border:1px solid;
  }
  .tag.pending{color:var(--alert);border-color:var(--alert);}
  .tag.done{color:var(--ok);border-color:var(--ok);}
  .store-body{display:none;border-top:1px solid var(--line);padding:14px;}
  .store.open .store-body{display:block;}

  .reason{
    font-size:14px;color:var(--sub);margin-bottom:12px;
  }
  .checkpoint{
    border-left:4px solid var(--alcon);background:var(--panel);
    padding:10px 12px;margin-bottom:16px;
  }
  .checkpoint .cp-label{
    font-size:12px;font-weight:700;color:var(--alcon);letter-spacing:1px;margin-bottom:6px;
  }
  .checkpoint li{font-size:14px;margin-left:18px;margin-bottom:4px;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-bottom:5px;}
  .field input[type=text],.field input[type=number],.field input[type=date],.field textarea,.field select{
    width:100%;border:1px solid var(--line);padding:11px;font-size:16px;
    font-family:inherit;background:#fff;color:var(--ink);border-radius:0;
    -webkit-appearance:none;appearance:none;
  }
  .field textarea{min-height:72px;resize:vertical;}
  .seg{display:flex;border:1px solid var(--line);}
  .seg button{
    flex:1;padding:11px 0;font-size:15px;background:#fff;border:none;
    font-family:inherit;color:var(--sub);cursor:pointer;
  }
  .seg button.sel-ok{background:var(--ok);color:#fff;font-weight:600;}
  .seg button.sel-alert{background:var(--alert);color:#fff;font-weight:600;}
  .seg button + button{border-left:1px solid var(--line);}

  .history{margin-top:16px;border-top:1px solid var(--line);padding-top:12px;}
  .history h4{font-size:13px;color:var(--sub);font-weight:700;letter-spacing:1px;margin-bottom:8px;}
  .visit{
    border:1px solid var(--line);padding:10px 12px;margin-bottom:8px;font-size:14px;
  }
  .visit .v-date{font-weight:700;color:var(--alcon);}
  .visit .v-del{
    float:right;border:1px solid var(--line);background:#fff;color:var(--sub);
    font-size:12px;padding:3px 10px;font-family:inherit;cursor:pointer;
  }
  .visit .v-del:active{color:var(--alert);border-color:var(--alert);}
  .visit .v-line{margin-top:3px;}
  .visit .stockout-yes{color:var(--alert);font-weight:700;}
  .visit .stockout-no{color:var(--ok);font-weight:600;}

  .empty{
    text-align:center;color:var(--sub);font-size:14px;padding:32px 16px;
    border:1px dashed var(--line);
  }

  .modal-bg{
    display:none;position:fixed;inset:0;background:rgba(28,37,48,.55);z-index:20;
  }
  .modal-bg.show{display:flex;align-items:flex-end;justify-content:center;}
  .modal{
    background:#fff;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;
    padding:18px 16px 28px;
  }
  .modal h3{font-size:17px;color:var(--alcon);margin-bottom:14px;}
  .modal textarea.report{min-height:220px;font-size:13px;width:100%;border:1px solid var(--line);padding:10px;font-family:inherit;}
  .hint{font-size:12px;color:var(--sub);margin-top:8px;}
  .row2{display:flex;gap:8px;margin-top:14px;}
  .row2 .btn{flex:1;}
  .msg{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:var(--ink);color:#fff;font-size:14px;padding:10px 18px;z-index:30;
    display:none;
  }

  .tabs{display:flex;border-bottom:2px solid var(--line);margin-bottom:16px;}
  .tabs button{
    flex:1;padding:12px 0;font-size:15px;font-weight:600;background:none;border:none;
    color:var(--sub);font-family:inherit;cursor:pointer;border-bottom:3px solid transparent;
    margin-bottom:-2px;
  }
  .tabs button.on{color:var(--alcon);border-bottom-color:var(--alcon);}
  .pane{display:none;}
  .pane.on{display:block;}

  .quickform{border:1px solid var(--line);padding:12px;margin-bottom:16px;background:var(--panel);}
  .note-item,.todo-item{
    border:1px solid var(--line);padding:11px 12px;margin-bottom:8px;background:#fff;font-size:14px;
  }
  .note-item .n-meta{font-size:12px;color:var(--sub);margin-bottom:4px;}
  .n-store{color:var(--alcon);font-weight:700;}
  .item-del{
    float:right;border:1px solid var(--line);background:#fff;color:var(--sub);
    font-size:12px;padding:3px 10px;font-family:inherit;cursor:pointer;
  }
  .todo-item{display:flex;gap:10px;align-items:flex-start;}
  .todo-item input[type=checkbox]{width:22px;height:22px;margin-top:1px;flex-shrink:0;accent-color:var(--alcon);}
  .todo-item .t-text{flex:1;}
  .todo-item.done .t-text{color:var(--sub);text-decoration:line-through;}
  .t-due{font-size:12px;color:var(--alert);font-weight:600;margin-top:2px;}
  .todo-item.done .t-due{color:var(--sub);}
  .sec-label{font-size:13px;color:var(--sub);font-weight:700;letter-spacing:1px;margin:14px 0 8px;}
  .cat-label{
    font-size:15px;color:var(--alcon);font-weight:800;letter-spacing:1px;
    margin:18px 0 6px;border-bottom:2px solid var(--alcon);padding-bottom:4px;
  }
  .seg button.sel-cat{background:var(--alcon);color:#fff;font-weight:600;}
  .t-cat{
    font-size:11px;font-weight:700;border:1px solid var(--alcon);color:var(--alcon);
    padding:1px 7px;margin-right:6px;cursor:pointer;display:inline-block;
  }
  .todo-item.done .t-cat{border-color:var(--sub);color:var(--sub);}
  .chkrow{display:flex;gap:14px;flex-wrap:wrap;}
  .itemrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .qty{width:72px;border:1px solid var(--line);padding:9px;font-size:16px;font-family:inherit;text-align:center;}
  .sample-flag{
    border-left:4px solid var(--alert);background:var(--panel);
    padding:8px 10px;font-size:13px;font-weight:600;margin-bottom:12px;
  }
  .alert-banner{
    border:1px solid var(--alert);color:var(--alert);background:#fff;
    padding:10px 12px;font-weight:700;font-size:14px;margin-bottom:14px;
  }
  .chk{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:600;}
  .chk input{width:20px;height:20px;accent-color:var(--alcon);}
  .seg button.sel-pr-red{background:var(--alert);color:#fff;font-weight:700;}
  .seg button.sel-pr-orange{background:#D97706;color:#fff;font-weight:700;}
  .seg button.sel-pr-green{background:var(--ok);color:#fff;font-weight:700;}
  .sample-item{border:1px solid var(--line);border-left:4px solid var(--line);padding:11px 12px;margin-bottom:8px;background:#fff;font-size:14px;display:flex;gap:10px;align-items:flex-start;}
  .sample-item.pr-red{border-left-color:var(--alert);}
  .sample-item.pr-orange{border-left-color:#D97706;}
  .sample-item.pr-green{border-left-color:var(--ok);}
  .sample-item input[type=checkbox]{width:22px;height:22px;margin-top:1px;flex-shrink:0;accent-color:var(--alcon);}
  .sample-item .s-body{flex:1;}
  .sample-item .s-store{font-weight:700;}
  .sample-item .s-items{color:var(--sub);margin-top:2px;font-size:13px;}
  .sample-item.done .s-store,.sample-item.done .s-items{color:var(--sub);text-decoration:line-through;}
</style>
</head>
<body>
<header>
  <h1>警示店拜訪追蹤</h1>
  <p>跨通路 · 警示店 · 隨手記 · 待辦 · 試用品 · 備份 · v1.9</p>
</header>

<div class="wrap">
  <div class="tabs">
    <button id="tab-stores" class="on" onclick="switchTab('stores')">警示店</button>
    <button id="tab-notes" onclick="switchTab('notes')">隨手記</button>
    <button id="tab-todos" onclick="switchTab('todos')">待辦</button>
    <button id="tab-samples" onclick="switchTab('samples')">試用品</button>
    <button id="tab-backup" onclick="switchTab('backup')">備份</button>
  </div>

  <div class="pane on" id="pane-stores">
    <div class="toolbar">
      <button class="btn primary" onclick="openAddStore()">＋ 新增警示店</button>
      <button class="btn" onclick="openReport()">產出回報文字</button>
    </div>
    <div id="storeList"></div>
  </div>

  <div class="pane" id="pane-notes">
    <div class="quickform">
      <div class="field"><label>想法 / 觀察 / 情報</label><textarea id="qn-text" placeholder="例:新莊店藥師說最近Complete帶動人工淚液詢問變多"></textarea></div>
      <div class="field"><label>相關通路/門市(選填)</label><input type="text" id="qn-store" placeholder="例:大樹-新莊店 或 佑全,可留空"></div>
      <button class="btn primary" style="width:100%" onclick="saveNote()">存入隨手記</button>
    </div>
    <div id="noteList"></div>
  </div>

  <div class="pane" id="pane-todos">
    <div class="quickform">
      <div class="field"><label>分類</label><div class="seg">
        <button id="cat-client" class="sel-cat" onclick="setCat('Client')">Client</button>
        <button id="cat-office" onclick="setCat('Office')">Office</button>
      </div></div>
      <div class="field"><label>追蹤事項</label><input type="text" id="qt-text" placeholder="例:7月底前確認宜安補貨到位"></div>
      <div class="field"><label>期限(選填)</label><input type="date" id="qt-due"></div>
      <button class="btn primary" style="width:100%" onclick="saveTodo()">加入待辦</button>
    </div>
    <div id="todoList"></div>
  </div>

  <div class="pane" id="pane-samples">
    <div id="sampleAlert"></div>
    <div class="quickform">
      <div class="field"><label>通路</label><select id="sp-channel" onchange="spChanChange()"></select>
        <input type="text" id="sp-chother" placeholder="輸入通路名稱" style="margin-top:8px;display:none;">
      </div>
      <div class="field"><label>門市名稱</label><input type="text" id="sp-store" placeholder="例:中和宜安"></div>
      <div class="field"><label>試用品品項(可複選,附數量)</label>
        <div class="itemrow"><label class="chk"><input type="checkbox" id="sp-complete"> Complete</label><input type="number" class="qty" id="sp-complete-q" value="1" min="1" inputmode="numeric" style="display:none"></div>
        <div class="itemrow"><label class="chk"><input type="checkbox" id="sp-haud"> HAUD</label><input type="number" class="qty" id="sp-haud-q" value="1" min="1" inputmode="numeric" style="display:none"></div>
        <div class="itemrow"><label class="chk"><input type="checkbox" id="sp-otherchk"> 其他</label><input type="number" class="qty" id="sp-other-q" value="1" min="1" inputmode="numeric" style="display:none"></div>
        <input type="text" id="sp-othertext" placeholder="其他品項內容" style="margin-top:8px;display:none;">
      </div>
      <div class="field"><label>優先程度</label><div class="seg">
        <button id="pr-red" onclick="setPr('red')">緊急🔴</button>
        <button id="pr-orange" class="sel-pr-orange" onclick="setPr('orange')">中度🟠</button>
        <button id="pr-green" onclick="setPr('green')">順路才去🟢</button>
      </div></div>
      <button class="btn primary" style="width:100%" onclick="saveSample()">加入配送清單</button>
    </div>
    <div id="sampleList"></div>
  </div>

  <div class="pane" id="pane-backup">
    <div id="backupInfo" class="quickform" style="font-size:14px;"></div>
    <div class="quickform">
      <div class="sec-label" style="margin-top:0">匯出備份</div>
      <p style="font-size:13px;color:var(--sub);margin-bottom:10px;">產出一段備份碼,存到備忘錄/密碼App,或貼給Claude留底。</p>
      <button class="btn primary" style="width:100%" onclick="exportBackup()">產出備份碼</button>
      <textarea id="bk-out" readonly style="width:100%;min-height:90px;margin-top:10px;font-size:11px;border:1px solid var(--line);padding:8px;font-family:monospace;display:none;"></textarea>
      <button class="btn" id="bk-copy" style="width:100%;margin-top:8px;display:none;" onclick="copyBackup()">複製備份碼</button>
    </div>
    <div class="quickform">
      <div class="sec-label" style="margin-top:0">匯入還原</div>
      <p style="font-size:13px;color:var(--sub);margin-bottom:10px;">貼上先前的備份碼,將完整覆蓋目前所有資料。</p>
      <textarea id="bk-in" placeholder="貼上 GTBK1. 開頭的備份碼" style="width:100%;min-height:90px;font-size:11px;border:1px solid var(--line);padding:8px;font-family:monospace;"></textarea>
      <button class="btn danger" style="width:100%;margin-top:8px;" onclick="importBackup()">還原資料</button>
    </div>
  </div>
</div>

<!-- 新增警示店 modal -->
<div class="modal-bg" id="addStoreModal">
  <div class="modal">
    <h3>新增警示店</h3>
    <div class="field"><label>通路</label><select id="ns-channel"></select></div>
    <div class="field"><label>門市名稱</label><input type="text" id="ns-name" placeholder="例:板橋文化"></div>
    <div class="field"><label>警示原因(為什麼要去)</label><textarea id="ns-reason" placeholder="例:HAUD連三月下滑,A階段止血店"></textarea></div>
    <div class="field"><label>現場檢查點(一行一項)</label><textarea id="ns-cp" placeholder="例:&#10;架上HAUD剩幾盒&#10;確認陳列位置有無被換掉"></textarea></div>
    <div class="row2">
      <button class="btn" onclick="closeModal('addStoreModal')">取消</button>
      <button class="btn primary" onclick="saveStore()">儲存</button>
    </div>
  </div>
</div>

<!-- 回報文字 modal -->
<div class="modal-bg" id="reportModal">
  <div class="modal">
    <h3>拜訪回報文字</h3>
    <div class="field"><label>輸出範圍</label><select id="rp-channel" onchange="buildReport()"></select></div>
    <textarea class="report" id="reportText" readonly></textarea>
    <p class="hint">全選複製後,貼回Claude對話即可納入月度分析判讀。</p>
    <div class="row2">
      <button class="btn" onclick="closeModal('reportModal')">關閉</button>
      <button class="btn primary" onclick="copyReport()">複製全文</button>
    </div>
  </div>
</div>

<div class="msg" id="msg"></div>

<script>
const KEY='alert-visit-tracker-v1';
let state={stores:[],visits:[],notes:[],todos:[]};
let pendingStockout={};

function migrate(s){
  if(!s.notes)s.notes=[];
  if(!s.todos)s.todos=[];
  if(!s.channels||!s.channels.length)s.channels=['大樹'];
  ['佑全','躍獅','其他'].forEach(c=>{if(!s.channels.includes(c))s.channels.push(c);});
  s.todos.forEach(t=>{if(!t.cat)t.cat='Client';});
  if(!s.samples)s.samples=[];
  s.stores.forEach(st=>{if(!st.channel)st.channel='大樹';});
  return s;
}

/* 雙模式儲存:Claude內用window.storage,Safari/桌面App用localStorage */
const hasClaudeStorage=typeof window.storage!=='undefined'&&window.storage&&typeof window.storage.get==='function';
const store={
  async get(){
    if(hasClaudeStorage){
      const r=await window.storage.get(KEY,false);
      return r&&r.value?r.value:null;
    }
    return localStorage.getItem(KEY);
  },
  async set(val){
    if(hasClaudeStorage){
      const r=await window.storage.set(KEY,val,false);
      return !!r;
    }
    localStorage.setItem(KEY,val);
    return true;
  }
};

const SEED={
  stores:[{
    id:'zhonghe-yian',
    name:'中和宜安',
    channel:'大樹',
    reason:'6月單月出貨12盒(低基期暴衝),需分辨真需求 vs 單月假象。最大實務風險:安全庫存可能已被清空,若7月斷貨會親手掐死剛萌芽的動能,數據上會看起來像「暴衝回落」,永遠分不清是假性還是被斷貨害的。',
    checkpoints:[
      '進門第一眼:架上HAUD還剩幾盒',
      '確認安全庫存有沒有被打空,快斷貨立刻協助補貨',
      '問藥師:6月為什麼賣得好?(單一客大量買/多位新客/藥師主動推)',
      '確認7月有無回購跡象'
    ],
    createdAt:new Date().toISOString()
  }],
  visits:[]
};

async function load(){
  try{
    const v=await store.get();
    if(v){state=migrate(JSON.parse(v));}
    else{state=migrate(SEED);await persist();}
  }catch(e){
    state=migrate(SEED);
    try{await persist();}catch(err){console.error(err);}
  }
  render();renderNotes();renderTodos();renderSamples();fillSampleChannels();
  document.getElementById('sp-otherchk').addEventListener('change',e=>{
    document.getElementById('sp-othertext').style.display=e.target.checked?'block':'none';
    document.getElementById('sp-other-q').style.display=e.target.checked?'inline-block':'none';
  });
  document.getElementById('sp-complete').addEventListener('change',e=>{
    document.getElementById('sp-complete-q').style.display=e.target.checked?'inline-block':'none';
  });
  document.getElementById('sp-haud').addEventListener('change',e=>{
    document.getElementById('sp-haud-q').style.display=e.target.checked?'inline-block':'none';
  });
  const days=state.lastBackup?Math.floor((new Date(today())-new Date(state.lastBackup))/86400000):999;
  if(days>=7)setTimeout(()=>toast(state.lastBackup?'距上次備份已'+days+'天,建議到「備份」分頁備份':'尚未備份過,建議到「備份」分頁備份'),800);
  const od=state.samples.filter(s=>!s.done&&s.priority==='red'&&dayDiff(s.created,today())>=3).length;
  if(od)setTimeout(()=>toast('⚠ '+od+' 筆緊急試用品超過3天未送達'),2800);
}
async function persist(){
  const payload=JSON.stringify(state);
  for(let i=0;i<3;i++){
    try{
      const ok=await store.set(payload);
      if(ok)return true;
    }catch(e){console.error('storage attempt '+(i+1),e);}
    await new Promise(res=>setTimeout(res,400*(i+1)));
  }
  toast('⚠ 儲存失敗:此筆資料可能不會被保留');
  return false;
}
function toast(t){
  const m=document.getElementById('msg');
  m.textContent=t;m.style.display='block';
  setTimeout(()=>m.style.display='none',2200);
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function today(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function lastVisit(storeId){
  const vs=state.visits.filter(v=>v.storeId===storeId);
  if(!vs.length)return null;
  return vs.sort((a,b)=>b.date.localeCompare(a.date))[0];
}

function render(){
  const el=document.getElementById('storeList');
  if(!state.stores.length){
    el.innerHTML='<div class="empty">尚無警示店。點「＋ 新增警示店」開始。</div>';
    return;
  }
  const byCh={};
  state.stores.forEach(s=>{(byCh[s.channel]=byCh[s.channel]||[]).push(s);});
  el.innerHTML=Object.keys(byCh).sort().map(ch=>
    '<div class="sec-label">'+esc(ch)+'('+byCh[ch].length+')</div>'+
    byCh[ch].map(s=>storeCard(s)).join('')
  ).join('');
}
function storeCard(s){
  const pend=state.samples.filter(sp=>!sp.done&&sp.channel===s.channel&&
    (sp.store===s.name||sp.store.includes(s.name)||s.name.includes(sp.store)));
  const flag=pend.length?'<div class="sample-flag">📦 試用品待送:'+
    pend.map(x=>PR[x.priority].t.slice(-2)+' '+esc(sampleItems(x))).join(' ; ')+'</div>':'';
    const lv=lastVisit(s.id);
    const tag=lv?'<span class="tag done">已拜訪 '+esc(lv.date)+'</span>':'<span class="tag pending">待拜訪</span>';
    const visits=state.visits.filter(v=>v.storeId===s.id).sort((a,b)=>b.date.localeCompare(a.date));
    const vh=visits.length?('<div class="history"><h4>拜訪紀錄</h4>'+visits.map(v=>
      '<div class="visit"><span class="v-date">'+esc(v.date)+'</span>'+
      '<button class="v-del" onclick="deleteVisit(\''+v.id+'\')">刪除</button>'+
      '<div class="v-line">架上HAUD:'+(v.shelfCount===''?'未記':esc(String(v.shelfCount))+' 盒')+' · '+
      (v.stockout==='yes'?'<span class="stockout-yes">斷貨/低於安全量</span>':'<span class="stockout-no">庫存正常</span>')+'</div>'+
      (v.feedback?'<div class="v-line">藥師回饋:'+esc(v.feedback)+'</div>':'')+
      (v.note?'<div class="v-line">備註:'+esc(v.note)+'</div>':'')+
      '</div>').join('')+'</div>'):'';
    return '<div class="store" id="st-'+s.id+'">'+
      '<div class="store-head" onclick="toggleStore(\''+s.id+'\')">'+
        '<span class="name">'+esc(s.name)+'</span>'+tag+
      '</div>'+
      '<div class="store-body">'+
        flag+
        '<p class="reason">'+esc(s.reason)+'</p>'+
        '<div class="checkpoint"><div class="cp-label">現場檢查點</div><ul>'+
          s.checkpoints.map(c=>'<li>'+esc(c)+'</li>').join('')+'</ul></div>'+
        '<div class="field"><label>拜訪日期</label><input type="date" id="d-'+s.id+'" value="'+today()+'"></div>'+
        '<div class="field"><label>架上HAUD盒數</label><input type="number" inputmode="numeric" id="c-'+s.id+'" placeholder="現場數一下"></div>'+
        '<div class="field"><label>庫存狀態</label><div class="seg">'+
          '<button id="so-no-'+s.id+'" onclick="setStock(\''+s.id+'\',\'no\')">庫存正常</button>'+
          '<button id="so-yes-'+s.id+'" onclick="setStock(\''+s.id+'\',\'yes\')">斷貨/低於安全量</button>'+
        '</div></div>'+
        '<div class="field"><label>藥師回饋(6月為什麼賣得好?)</label><textarea id="f-'+s.id+'"></textarea></div>'+
        '<div class="field"><label>備註</label><textarea id="n-'+s.id+'"></textarea></div>'+
        '<button class="btn primary" style="width:100%" onclick="saveVisit(\''+s.id+'\')">儲存本次拜訪</button>'+
        '<div class="row2">'+
          '<button class="btn small danger" onclick="removeStore(\''+s.id+'\')">移除此警示店</button>'+
        '</div>'+
        vh+
      '</div></div>';
}

/* ---- 試用品配送 ---- */
let pendingPr='orange';
const PR={red:{t:'緊急🔴',o:0},orange:{t:'中度🟠',o:1},green:{t:'順路才去🟢',o:2}};
function fillSampleChannels(){
  const sel=document.getElementById('sp-channel');
  const keep=sel.value;
  const base=state.channels.filter(c=>c!=='其他');
  sel.innerHTML=base.map(c=>'<option value="'+esc(c)+'">'+esc(c)+'</option>').join('')+
    '<option value="__other__">其他</option>';
  if(keep)sel.value=keep;
}
function spChanChange(){
  document.getElementById('sp-chother').style.display=
    document.getElementById('sp-channel').value==='__other__'?'block':'none';
}
function setPr(p){
  pendingPr=p;
  ['red','orange','green'].forEach(x=>{
    document.getElementById('pr-'+x).className=(x===p)?('sel-pr-'+x):'';
  });
}
function dayDiff(a,b){return Math.floor((new Date(b)-new Date(a))/86400000);}
function sampleItems(s){
  const arr=(s.items||[]).map(i=>typeof i==='string'?i:(i.n+'×'+i.q));
  if(s.other)arr.push(s.other);
  return arr.join('、');
}
function renderSamples(){
  const el=document.getElementById('sampleList');
  const alertEl=document.getElementById('sampleAlert');
  const overdue=state.samples.filter(s=>!s.done&&s.priority==='red'&&dayDiff(s.created,today())>=3);
  alertEl.innerHTML=overdue.length?
    '<div class="alert-banner">⚠ '+overdue.length+' 筆緊急🔴試用品已超過3天未送達:'+
    overdue.map(s=>(s.channel?s.channel+'-':'')+s.store).join('、')+'</div>':'';
  if(!state.samples.length){el.innerHTML='<div class="empty">目前沒有待送的試用品。</div>';return;}
  const open=state.samples.filter(s=>!s.done).sort((a,b)=>(PR[a.priority].o-PR[b.priority].o)||a.created.localeCompare(b.created));
  const done=state.samples.filter(s=>s.done).sort((a,b)=>(b.doneDate||'').localeCompare(a.doneDate||''));
  let h='';
  if(open.length){h+='<div class="sec-label">待配送('+open.length+')</div>'+open.map(sampleRow).join('');}
  if(done.length){h+='<div class="sec-label">已送達</div>'+done.map(sampleRow).join('');}
  el.innerHTML=h;
}
function sampleRow(s){
  return '<div class="sample-item pr-'+s.priority+(s.done?' done':'')+'">'+
    '<input type="checkbox" '+(s.done?'checked':'')+' onchange="toggleSample(\''+s.id+'\')">'+
    '<div class="s-body"><div class="s-store">'+PR[s.priority].t.slice(-2)+' '+(s.channel?esc(s.channel)+'-':'')+esc(s.store)+'</div>'+
    '<div class="s-items">'+esc(sampleItems(s))+(s.done&&s.doneDate?' · 送達 '+esc(s.doneDate):'')+'</div></div>'+
    '<button class="item-del" onclick="deleteSample(\''+s.id+'\')">刪除</button></div>';
}
async function saveSample(){
  const storeName=document.getElementById('sp-store').value.trim();
  if(!storeName){toast('請輸入門市名稱');return;}
  let chan=document.getElementById('sp-channel').value;
  if(chan==='__other__'){
    chan=document.getElementById('sp-chother').value.trim();
    if(!chan){toast('選了「其他」請輸入通路名稱');return;}
  }
  const items=[];
  const q=id=>Math.max(1,Number(document.getElementById(id).value)||1);
  if(document.getElementById('sp-complete').checked)items.push({n:'Complete',q:q('sp-complete-q')});
  if(document.getElementById('sp-haud').checked)items.push({n:'HAUD',q:q('sp-haud-q')});
  let other='';
  if(document.getElementById('sp-otherchk').checked){
    const ot=document.getElementById('sp-othertext').value.trim();
    if(!ot){toast('勾了「其他」請輸入品項內容');return;}
    items.push({n:ot,q:q('sp-other-q')});
  }
  if(!items.length){toast('請至少勾選一個品項');return;}
  state.samples.push({id:'sp'+Date.now(),store:storeName,channel:chan,items:items,other:other,
    priority:pendingPr,created:today(),done:false,doneDate:''});
  await persist();
  document.getElementById('sp-store').value='';
  document.getElementById('sp-chother').value='';
  document.getElementById('sp-chother').style.display='none';
  document.getElementById('sp-channel').selectedIndex=0;
  ['sp-complete','sp-haud','sp-otherchk'].forEach(i=>document.getElementById(i).checked=false);
  ['sp-complete-q','sp-haud-q','sp-other-q'].forEach(i=>{const e=document.getElementById(i);e.value=1;e.style.display='none';});
  document.getElementById('sp-othertext').value='';
  document.getElementById('sp-othertext').style.display='none';
  renderSamples();render();toast('已加入配送清單');
}
async function toggleSample(id){
  const s=state.samples.find(x=>x.id===id);
  if(!s)return;
  s.done=!s.done;
  s.doneDate=s.done?today():'';
  await persist();renderSamples();render();
}
async function deleteSample(id){
  if(!confirm('刪除這筆試用品配送?'))return;
  state.samples=state.samples.filter(x=>x.id!==id);
  await persist();renderSamples();render();toast('已刪除');
}

/* ---- 備份 / 還原 ---- */
function chk(s){let h=5381;for(let i=0;i<s.length;i++){h=((h<<5)+h+s.charCodeAt(i))>>>0;}return h.toString(36);}
function b64e(s){return btoa(unescape(encodeURIComponent(s)));}
function b64d(s){return decodeURIComponent(escape(atob(s)));}
function updateBackupInfo(){
  const el=document.getElementById('backupInfo');
  const c={stores:state.stores.length,visits:state.visits.length,notes:state.notes.length,todos:state.todos.length,samples:state.samples.length};
  let line='目前資料:警示店 '+c.stores+' · 拜訪 '+c.visits+' · 隨手記 '+c.notes+' · 待辦 '+c.todos+' · 試用品 '+c.samples+'<br>';
  if(state.lastBackup){
    const days=Math.floor((new Date(today())-new Date(state.lastBackup))/86400000);
    line+='上次備份:'+state.lastBackup+'(距今 '+days+' 天)';
    if(days>=7)line+=' <b style="color:var(--alert)">建議立即備份</b>';
  }else{
    line+='<b style="color:var(--alert)">從未備份,建議立即備份</b>';
  }
  el.innerHTML=line;
}
async function exportBackup(){
  state.lastBackup=today();
  await persist();
  const json=JSON.stringify(state);
  const body=b64e(json);
  const code='GTBK1.'+body+'.'+chk(body);
  const ta=document.getElementById('bk-out');
  ta.value=code;ta.style.display='block';
  document.getElementById('bk-copy').style.display='block';
  updateBackupInfo();
  toast('備份碼已產出,請複製保存');
}
function copyBackup(){
  const ta=document.getElementById('bk-out');
  ta.select();ta.setSelectionRange(0,9999999);
  let ok=false;
  try{ok=document.execCommand('copy');}catch(e){}
  if(!ok&&navigator.clipboard){
    navigator.clipboard.writeText(ta.value).then(()=>toast('已複製')).catch(()=>toast('請手動長按全選複製'));
    return;
  }
  toast(ok?'已複製':'請手動長按全選複製');
}
async function importBackup(){
  const raw=document.getElementById('bk-in').value.trim();
  if(!raw){toast('請先貼上備份碼');return;}
  const m=raw.match(/^GTBK1\.([A-Za-z0-9+/=]+)\.([a-z0-9]+)$/);
  if(!m){toast('備份碼格式不正確');return;}
  if(chk(m[1])!==m[2]){toast('備份碼不完整或已損壞(校驗失敗),請確認有複製到全文');return;}
  let data;
  try{data=migrate(JSON.parse(b64d(m[1])));}
  catch(e){toast('備份碼解析失敗');return;}
  const c={s:data.stores.length,v:data.visits.length,n:data.notes.length,t:data.todos.length};
  if(!confirm('確定還原?備份內容:警示店'+c.s+'/拜訪'+c.v+'/隨手記'+c.n+'/待辦'+c.t+'\n目前資料將被完整覆蓋,無法復原。'))return;
  state=data;
  await persist();
  render();renderNotes();renderTodos();renderSamples();updateBackupInfo();
  document.getElementById('bk-in').value='';
  toast('還原完成');
}

let pendingCat='Client';
function setCat(c){
  pendingCat=c;
  document.getElementById('cat-client').className=c==='Client'?'sel-cat':'';
  document.getElementById('cat-office').className=c==='Office'?'sel-cat':'';

function renderTodos(){
  const el=document.getElementById('todoList');
  if(!state.todos.length){el.innerHTML='<div class="empty">還沒有追蹤事項。</div>';return;}

  ['Office','Client'].forEach(cat=>{
    const list=state.todos.filter(t=>(t.cat||'Client')===cat);
    if(!list.length)return;
    const open=list.filter(t=>!t.done).sort((a,b)=>(a.due||'9999').localeCompare(b.due||'9999'));

function todoRow(t){

function openReport(){
  const sel=document.getElementById('rp-channel');
  sel.innerHTML='<option value="__all__">全部通路</option>'+
    state.channels.map(c=>'<option value="'+esc(c)+'">'+esc(c)+'</option>').join('');
  buildReport();
  document.getElementById('reportModal').classList.add('show');
}
function buildReport(){
  const pick=document.getElementById('rp-channel').value||'__all__';
  const inScope=s=>pick==='__all__'||s.channel===pick;
  const tag=pick==='__all__'?'全部通路':pick;
  let out='【警示店拜訪回報 · '+tag+'】產出日期:'+today()+'\n\n';
  const byCh={};
  state.stores.filter(inScope).forEach(s=>{(byCh[s.channel]=byCh[s.channel]||[]).push(s);});
  Object.keys(byCh).sort().forEach(ch=>{
    out+='=== 通路:'+ch+' ===\n';
    byCh[ch].forEach(s=>{
    const vs=state.visits.filter(v=>v.storeId===s.id).sort((a,b)=>a.date.localeCompare(b.date));
    out+='■ '+s.name+'\n警示原因:'+s.reason+'\n';
    if(!vs.length){out+='(尚未拜訪)\n\n';return;}
    vs.forEach(v=>{
      out+='- '+v.date+' 架上HAUD:'+(v.shelfCount===''?'未記':v.shelfCount+'盒')+
        ' | '+(v.stockout==='yes'?'斷貨/低於安全量':'庫存正常');
      if(v.feedback)out+=' | 藥師回饋:'+v.feedback;
      if(v.note)out+=' | 備註:'+v.note;
      out+='\n';
    });
    out+='\n';
    });
  });
  const noteScope=state.notes.filter(n=>{
    if(pick==='__all__')return true;
    if(!n.store)return true; /* 未標記通路的隨手記一律附上,避免漏情報 */
    if(n.store.includes(pick))return true;
    return state.stores.some(s=>s.channel===pick&&n.store.includes(s.name));
  });
  if(noteScope.length){
    out+='【隨手記 / 現場情報】'+(pick!=='__all__'?'(含未標通路者)':'')+'\n';
    [...noteScope].sort((a,b)=>a.date.localeCompare(b.date)).forEach(n=>{
      out+='- '+n.date+(n.store?' ['+n.store+']':'')+' '+n.text+'\n';
    });
    out+='\n';
  }
  const openT=state.todos.filter(t=>!t.done),doneT=state.todos.filter(t=>t.done);
  if(openT.length||doneT.length){
    out+='【追蹤待辦】(全部)\n';
    ['Office','Client'].forEach(cat=>{
      const o=openT.filter(t=>(t.cat||'Client')===cat),d=doneT.filter(t=>(t.cat||'Client')===cat);
      if(!o.length&&!d.length)return;
      out+='('+cat+')\n';
      o.forEach(t=>{out+='- [未完成] '+t.text+(t.due?' (期限'+t.due+')':'')+'\n';});
      d.forEach(t=>{out+='- [已完成 '+t.doneDate+'] '+t.text+'\n';});
    });
    out+='\n';
  }
  const openS=state.samples.filter(s=>!s.done),doneS=state.samples.filter(s=>s.done);
  if(openS.length||doneS.length){
    out+='【試用品配送】(全部)\n';
    openS.sort((a,b)=>PR[a.priority].o-PR[b.priority].o).forEach(s=>{
      out+='- [待送·'+PR[s.priority].t+'] '+(s.channel?s.channel+'-':'')+s.store+':'+sampleItems(s)+'\n';});
    doneS.forEach(s=>{out+='- [已送達 '+s.doneDate+'] '+(s.channel?s.channel+'-':'')+s.store+':'+sampleItems(s)+'\n';});
    out+='\n';
  }
  document.getElementById('reportText').value=out;
}
function copyReport(){
  const ta=document.getElementById('reportText');
  ta.select();ta.setSelectionRange(0,999999);
  let ok=false;
  try{ok=document.execCommand('copy');}catch(e){}
  if(!ok&&navigator.clipboard){
    navigator.clipboard.writeText(ta.value).then(()=>toast('已複製')).catch(()=>toast('請手動長按全選複製'));
    return;
  }
  toast(ok?'已複製':'請手動長按全選複製');
}
load();
</script>
